<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amasya’da Tarihin Dönüm Noktası</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600&display=swap');

*{
  box-sizing:border-box;
}

body{
  margin:0;
  overflow:hidden;
  font-family:'Inter',sans-serif;
  color:#f3ead7;
  background:
    radial-gradient(circle at center, rgba(145,92,32,.25), transparent 40%),
    linear-gradient(135deg,#050403,#120d09,#050403);
  min-height:100vh;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
  opacity:.18;
  pointer-events:none;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  box-shadow:inset 0 0 220px rgba(0,0,0,.95);
  pointer-events:none;
}

.container{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:30px;
}

.card{
  width:min(900px,100%);
  position:relative;
  padding:60px;
  border:1px solid rgba(212,166,79,.3);
  background:rgba(10,8,6,.58);
  backdrop-filter:blur(10px);
  box-shadow:
    0 0 40px rgba(0,0,0,.45),
    0 30px 120px rgba(0,0,0,.8);
  animation:fadeUp 1.2s ease;
}

.card::before{
  content:"";
  position:absolute;
  inset:0;
  border:1px solid rgba(255,255,255,.03);
  pointer-events:none;
}

.eyebrow{
  color:#d4a64f;
  letter-spacing:7px;
  font-size:13px;
  margin-bottom:18px;
  text-transform:uppercase;
  animation:flicker 4s infinite;
}

h1{
  margin:0 0 26px;
  font-family:'Cinzel',serif;
  font-size:clamp(40px,6vw,74px);
  line-height:1.05;
  text-shadow:0 0 20px rgba(255,214,140,.08);
}

p{
  color:#e6d9bc;
  line-height:1.9;
  font-size:18px;
  opacity:.92;
  animation:fadeText 1s ease;
}

#choices{
  margin-top:34px;
  display:grid;
  gap:14px;
}

button{
  position:relative;
  overflow:hidden;
  padding:18px;
  border:none;
  cursor:pointer;
  background:rgba(191,139,55,.08);
  border:1px solid rgba(212,166,79,.35);
  color:#fff1cf;
  font-size:16px;
  transition:.35s;
  backdrop-filter:blur(4px);
}

button:hover{
  transform:translateY(-2px);
  background:rgba(191,139,55,.18);
  box-shadow:0 10px 30px rgba(191,139,55,.16);
}

button::before{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:120%;
  height:100%;
  background:linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.12),
    transparent
  );
  transition:.6s;
}

button:hover::before{
  left:120%;
}

.fade{
  animation:fadeScene .7s ease;
}

@keyframes fadeScene{
  from{
    opacity:0;
    transform:translateY(12px);
    filter:blur(8px);
  }
  to{
    opacity:1;
    transform:translateY(0);
    filter:blur(0);
  }
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(24px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes fadeText{
  from{
    opacity:0;
    transform:translateY(8px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes flicker{
  0%,18%,22%,25%,53%,57%,100%{
    opacity:1;
  }
  20%,24%,55%{
    opacity:.45;
  }
}

@media(max-width:700px){
  .card{
    padding:32px;
  }

  h1{
    font-size:42px;
  }

  p{
    font-size:16px;
  }
}
</head>
<body>
  <div class="card">
    <div class="eyebrow" id="eyebrow">1919 — AMASYA</div>
    <h1 id="title">Amasya’da Tarihin Dönüm Noktası</h1>
    <div id="text"></div>
    <div id="choices"></div>
  </div>

  <script>
    const scenes = [
      {
        title: "Amasya’da Tarihin Dönüm Noktası",
        eyebrow: "1919 — AMASYA",
        text: [
          "Mondros Ateşkes Antlaşması’nın ardından Anadolu’nun birçok bölgesi işgal altındadır.",
          "Sen, Mustafa Kemal Atatürk ile birlikte Amasya’da bulunan genç bir komutansın."
        ],
        choices: [{ label: "Hikâyeye Başla", next: 1 }]
      },
      {
        title: "Toplantının Gizliliği",
        eyebrow: "KARAR 1",
        text: ["Hazırlanan bildirinin öğrenilmesi büyük risk taşımaktadır."],
        choices: [
          { label: "Toplantıları gizli yürüt", next: 2 },
          { label: "Daha fazla kişiyi dahil et", next: 2 }
        ]
      },
      {
        title: "Genelgenin En Güçlü Mesajı",
        eyebrow: "KARAR 2",
        text: ["Millete verilecek mesaj belirlenmektedir."],
        choices: [
          { label: "Milletin azim ve kararını merkeze al", next: 3 },
          { label: "Dış destek umudunu öne çıkar", next: 3 }
        ]
      },
      {
        title: "Sivas Kongresi Çağrısı",
        eyebrow: "KARAR 3",
        text: ["Ülke çapında bir kongre toplanması önerilecektir."],
        choices: [
          { label: "Derhâl çağrı yap", next: 4 },
          { label: "Bekle ve koşulları gözle", next: 4 }
        ]
      },
      {
        title: "Millî İrade Doğuyor",
        eyebrow: "FİNAL",
        text: [
          "Amasya Genelgesi başarıyla yayımlanır.",
          "Erzurum ve Sivas kongrelerinin yolu açılır.",
          "Bir milletin kaderi, Amasya’da alınan cesur kararlarla değişti."
        ],
        choices: [{ label: "Yeniden Başla", next: 0 }]
      }
    ];

    function render(index) {
      const scene = scenes[index];
      document.getElementById("eyebrow").innerText = scene.eyebrow;
      document.getElementById("title").innerText = scene.title;
      document.getElementById("text").innerHTML = scene.text.map(t => `<p>${t}</p>`).join("");
      document.getElementById("choices").innerHTML = "";

      scene.choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.innerText = choice.label;
        btn.onclick = () => render(choice.next);
        document.getElementById("choices").appendChild(btn);
      });
    }

    render(0);
  </script>
</body>
</html>
